name: Deploy playground to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OWD client (workspace deps)
        uses: actions/checkout@v4
        with:
          repository: owdproject/client
          path: client
          submodules: recursive

      - name: Checkout kit-tailwind
        uses: actions/checkout@v4
        with:
          repository: owdproject/kit-tailwind
          path: client/packages/kit-tailwind

      - name: Checkout kit-primevue
        uses: actions/checkout@v4
        with:
          repository: owdproject/kit-primevue
          path: client/packages/kit-primevue

      - name: Checkout module-fs
        uses: actions/checkout@v4
        with:
          repository: owdproject/module-fs
          path: client/packages/module-fs

      - name: Checkout module-persistence
        uses: actions/checkout@v4
        with:
          repository: owdproject/module-persistence
          path: client/packages/module-persistence

      - name: Checkout theme-win95
        uses: actions/checkout@v4
        with:
          repository: owdproject/theme-win95
          path: client/themes/theme-win95

      - name: Overlay this app-wasmboy repo
        uses: actions/checkout@v4
        with:
          path: client/apps/app-wasmboy

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Allow wasmboy git dependency build scripts
        working-directory: client
        run: node apps/app-wasmboy/ci/patch-client-workspace.mjs

      - name: Point playground at theme-win95 until theme-win31 is published
        working-directory: client/apps/app-wasmboy
        run: |
          sed -i 's/@owdproject\/theme-win31/@owdproject\/theme-win95/g' playground/package.json
          sed -i 's/theme-win31/theme-win95/g' playground/desktop.config.ts

      - name: Install monorepo dependencies
        working-directory: client
        run: pnpm install --no-frozen-lockfile

      - name: Prepare module and playground
        working-directory: client/apps/app-wasmboy
        run: pnpm run dev:prepare

      - name: Generate static playground
        working-directory: client/apps/app-wasmboy
        run: pnpm run dev:generate
        env:
          NUXT_APP_BASE_URL: /app-wasmboy/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/apps/app-wasmboy/playground/.output/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
